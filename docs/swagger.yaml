definitions:
  main.APIError:
    properties:
      code:
        type: integer
      message:
        type: string
    type: object
  main.ReserveSubnetRequest:
    properties:
      comment:
        description: Can be empty
        type: string
      may_overlap:
        type: boolean
      prefix:
        type: string
    type: object
  main.SubnetResponse:
    properties:
      comment:
        type: string
      id:
        type: integer
      may_overlap:
        type: boolean
      prefix:
        type: string
    type: object
info:
  contact: {}
paths:
  /api/v1/subnets/{key}:
    delete:
      parameters:
      - description: Subnet id
        in: path
        name: key
        required: true
        type: string
      produces:
      - application/json
      responses:
        "204":
          description: No content
        "404":
          description: Not found
          schema:
            $ref: '#/definitions/main.APIError'
      summary: Delete a subnet
      tags:
      - subnets
  /api/v1/subnets/reserved:
    get:
      consumes:
      - application/json
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/main.SubnetResponse'
            type: array
      summary: Get reserved subnets
      tags:
      - subnets
    post:
      consumes:
      - application/json
      parameters:
      - description: subnet
        in: body
        name: subnet
        required: true
        schema:
          $ref: '#/definitions/main.ReserveSubnetRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/main.SubnetResponse'
        "400":
          description: Bad request
          schema:
            $ref: '#/definitions/main.APIError'
        "409":
          description: Subnet overlaps with existing
          schema:
            $ref: '#/definitions/main.APIError'
      summary: Reserve a subnet
      tags:
      - subnets
swagger: "2.0"
